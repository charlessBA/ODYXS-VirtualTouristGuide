transport.tips.title=Tips for Getting Around Safely
transport.tip1=In the Historic Centre, the best option is <strong>walking</strong>: everything is just minutes away and you get to enjoy the architecture up close.
transport.tip2=Always agree on the taxi fare <strong>before getting in</strong>, or ask the driver to turn on the meter.
transport.tip3=For the islands, leave from <strong>Muelle de la Bodeguita</strong> before 9 AM to avoid queues.
transport.tip4=<strong>InDriver or Uber</strong> are safer for night-time trips as they keep a record of your journey.
transport.tip5=<strong>Transcaribe</strong> connects the airport to the city centre for under $4,000. A rechargeable card is required.
transport.tip6=Avoid displaying valuables in less-busy streets. The Historic Centre is very safe during the day.

