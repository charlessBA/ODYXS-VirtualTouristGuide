transport.page.title=Transport — ODYXS
transport.hero.title=Getting Around Cartagena
transport.hero.subtitle=Complete transport guide for every traveller

transport.card1.tipo=Public Transport
transport.card1.nombre=Transcaribe
transport.card1.desc=Cartagena's articulated bus network. Links the airport, El Bosque, Ternera and the city centre. Flat, affordable fares. Use a rechargeable card available at any station.
transport.card1.ruta=Airport → City Centre: Line T102
transport.card1.costo=💰 ~$3,900 COP per trip

transport.card2.tipo=Regular Taxi
transport.card2.nombre=Cartagena Taxi
transport.card2.desc=Yellow taxis are widely available. Always agree on the fare before you get in, or ask the driver to use the meter. Fixed rates inside the historic centre are usually $8,000–$12,000 COP. Fares can rise 20% at night.
transport.card2.costo=💰 $13,300–$30,000 COP

transport.card3.tipo=Ride-Hailing App
transport.card3.nombre=InDriver / Uber
transport.card3.desc=InDriver is the most popular app in Cartagena. You propose the fare and the driver accepts. Cheaper and safer than street taxis. Uber and Didi are also available for extra convenience.
transport.card3.costo=💰 10–30% cheaper than a taxi

transport.card4.tipo=Water Transport
transport.card4.nombre=Boats to the Islands
transport.card4.desc=The most exciting way to travel. Daily shared boats depart from Muelle de la Bodeguita (City Centre) and Muelle de Manga to Islas del Rosario and Playa Blanca. Departures between 8–9 AM.
transport.card4.costo=💰 $60,000–$120,000 COP round trip

transport.card5.tipo=On Foot
transport.card5.nombre=Historic Centre on foot
transport.card5.desc=The best way to explore the Historic Centre, Getsemaní and San Diego. Everything is 10–20 minutes away on foot. Wear comfortable shoes — cobblestone streets are uneven. Avoid the midday sun between 12–3 PM.
transport.card5.costo=💰 Free

