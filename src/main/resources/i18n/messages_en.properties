# History
guia.historia.title=History &amp; Culture
guia.historia.p1=Founded in <strong>1533 by Pedro de Heredia</strong>, Cartagena was the main Spanish colonial port in South America. Its imposing walls and Castillo de San Felipe made it virtually impregnable for centuries, withstanding attacks from pirates like Francis Drake.
guia.historia.p2=On <strong>November 11, 1811</strong> it declared independence, becoming the first city in Colombia to do so — hence the nickname "La Heroica". In <strong>1984</strong>, UNESCO declared its historic center and fortresses a World Heritage Site.
guia.historia.quote=Cartagena was direct inspiration for Gabriel García Márquez, Nobel Prize in Literature 1982. Its cobblestone streets and colorful balconies appear in <em>Love in the Time of Cholera</em>.

guia.tl.y1533.title=Founded by Pedro de Heredia
guia.tl.y1533.desc=Established as a strategic colonial port on the Caribbean.
guia.tl.y1586.title=Francis Drake's Attack
guia.tl.y1586.desc=The English pirate sacked the city, accelerating the construction of its defenses.
guia.tl.y17c.year=17th Century
guia.tl.y17c.title=The Walls and the Castle
guia.tl.y17c.desc=The 11 km of walls and Castillo San Felipe de Barajas are completed.
guia.tl.y1811.title=Independence — "La Heroica"
guia.tl.y1811.desc=First city in Colombia to declare independence from Spain.
guia.tl.y1984.title=UNESCO World Heritage
guia.tl.y1984.desc=The historic center and fortresses are declared a World Heritage Site.
guia.tl.today=Today
guia.tl.today.title=Colombia's #1 Destination
guia.tl.today.desc=Over 1.5 million tourists visit La Heroica every year.

# Neighborhoods
guia.barrios.title=Neighborhoods to Explore
guia.b1.name=Historic Center
guia.b1.desc=The heart of the walled city. Cobblestone streets, colonial plazas, Santa Catalina Cathedral and the Palace of the Inquisition.
guia.b1.badge=Must-see
guia.b2.name=Getsemaní
guia.b2.desc=The bohemian and artistic neighborhood. Vibrant street murals, champeta music, authentic bars and the best nightlife in the city.
guia.b2.badge=Art & Culture
guia.b3.name=Bocagrande
guia.b3.desc=The modern area with luxury hotels, restaurants and beach. The skyscraper skyline contrasts beautifully with the colonial old town visible in the background.
guia.b3.badge=Beach & Hotels
guia.b4.name=Manga
guia.b4.desc=A peaceful residential island with the Fishing Club and yacht dock. Panoramic bay views and an authentic local atmosphere.
guia.b4.badge=Local & Relaxed
guia.b5.name=Castillo Grande
guia.b5.desc=Upscale residential peninsula at the end of Bocagrande. Quieter beaches, condominiums and the Cartagena Nautical Club.
guia.b5.badge=Residential
guia.b6.name=San Diego
guia.b6.desc=Colonial neighborhood inside the walls. Convents, baroque churches and the Las Bóvedas market — ideal for buying handicrafts.
guia.b6.badge=Shopping & Art

# Beaches
guia.playas.title=Best Beaches
guia.p1.name=Playa Blanca — Barú
guia.p1.badge=🥇 Top
guia.p1.desc=White sand and turquoise waters. The most famous beach on the Colombian Caribbean.
guia.p1.costo=💰 ~$60,000 COP by boat
guia.p2.name=Bocagrande
guia.p2.badge=Most accessible
guia.p2.desc=The closest to the center. Beachside restaurants and Caribbean atmosphere.
guia.p2.costo=💰 Free access
guia.p3.name=Islas del Rosario
guia.p3.badge=🤿 Diving
guia.p3.desc=28 coral islands. Crystal-clear water ideal for snorkeling and diving. La Laguna Encantada glows at night.
guia.p3.costo=💰 Tour from $80,000 COP
guia.playas.howto.title=How to get to the islands
guia.playas.howto.desc=Boats depart from <strong>Muelle de la Bodeguita</strong> (in front of the historic center) and <strong>Muelle de Manga</strong>. Shared boats leave between 8–9 AM. For more privacy you can rent a private boat or join an organized tour with lunch included.

# When to go
guia.cuando.title=When to Visit Cartagena
guia.season1.title=Best Season
guia.season1.months=December — April
guia.season1.desc=Dry weather, guaranteed sunshine. Perfect for beaches. Hay Festival (January), peak season. Higher prices but the best experience.
guia.season2.title=Shoulder Season
guia.season2.months=May — Jul / Oct — Nov
guia.season2.desc=Short afternoon showers. Less crowded city, lower prices. November: Independence Day festivities (Nov 11).
guia.season3.title=Rainy Season
guia.season3.months=August — September
guia.season3.desc=Frequent but brief downpours. Most affordable prices. Isla Grande at night: spectacular bioluminescent plankton. Bring a raincoat.

# Gastronomy
guia.gastro.title=Caribbean Gastronomy
guia.gastro.intro=Cartagena's cuisine is a fusion of three cultures: indigenous ingredients (yuca, corn), African techniques (coconut milk, spices) and Spanish seasoning. The result is a gastronomy unique in Latin America.
guia.dish1.name=Shrimp Ceviche
guia.dish1.desc=The most iconic dish. Fresh and spicy with chili pepper.
guia.dish2.name=Arepa de Huevo
guia.dish2.desc=The most Cartagena snack there is. Fried corn dough with egg.
guia.dish3.name=Seafood Cazuela
guia.dish3.desc=Creamy coconut milk stew with chipi chipi clams.
guia.dish4.name=Corozo Juice
guia.dish4.desc=The most Cartagena drink. Fruity and refreshing.
guia.dish5.name=Coconut Rice
guia.dish5.desc=The essential side dish for every coastal meal.
guia.dish6.name=Carimañola de Yuca
guia.dish6.desc=Fried yuca dough stuffed with meat or cheese.
guia.dish7.name=Rum + Chocolate
guia.dish7.desc=Classic tasting experience at El Arsenal, Getsemaní.
guia.dish8.name=Garlic Lobster
guia.dish8.desc=Premium dish at restaurants in the Historic Center.
guia.gastro.rests.title=Recommended restaurants
guia.rest1.name=Jardín Santa Clara
guia.rest1.desc=Fine dining at the Sofitel. Exquisite colonial atmosphere.
guia.rest2.name=Alma
guia.rest2.desc=Restaurant 1621. Signature cuisine with Caribbean ingredients.
guia.rest3.name=La Cevichería
guia.rest3.desc=Best ceviche in the historic center. Advance booking required.

# Tips
guia.consejos.title=💡 Travel Tips
guia.before.title=Before you arrive
guia.c1.title=Download offline maps
guia.c1.desc=Google Maps or Maps.me without internet are essential. Street WiFi is intermittent.
guia.c2.title=SPF 50+ sunscreen
guia.c2.desc=The Caribbean sun is very intense. Apply every 2 hours, especially on the islands.
guia.c3.title=Book hotels in advance
guia.c3.desc=In peak season (Dec–Apr) Historic Center hotels sell out weeks ahead.
guia.c4.title=Walk the center at night
guia.c4.desc=The Historic Center is safe and magical at night. The illuminated walls are unmissable.
guia.during.title=During your visit
guia.c5.title=Negotiate beach prices
guia.c5.desc=Beach vendors expect bargaining. The first price offered is usually double.
guia.c6.title=Use InDriver or Uber
guia.c6.desc=Cheaper and safer than street taxis. Heavy traffic during rush hours (7–9 AM, 5–7 PM).
guia.c7.title=Head to the islands early
guia.c7.desc=Boats leave at 8–9 AM. If you arrive late, the best spots on the beach will already be taken.
guia.c8.title=Watch the sunset
guia.c8.desc=Sit on the city walls for the best sunset view in all of Cartagena.

