about.p1=ODYXS is your intelligent tourist guide for Cartagena de Indias — the walled city declared a UNESCO World Heritage Site in 1984. Founded in 1533 by Pedro de Heredia, La Heroica blends colonial history, paradisiacal beaches and vibrant Caribbean culture.
about.p2=Its colorful cobblestone streets, the imposing Castillo San Felipe de Barajas and the turquoise waters of the Islas del Rosario make it the most visited destination in Colombia. Every corner holds secrets that inspired Gabriel García Márquez, Nobel Prize in Literature.
