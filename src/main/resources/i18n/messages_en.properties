info.tag=Information
info.title=What you need to know before traveling
info.clima.title=Climate
info.clima.desc=Tropical with an average temperature of 27°C year-round. Dry season: December–April (ideal for tourism). Rainy season: May–November.
info.llegada.title=How to get there
info.llegada.desc=Rafael Núñez International Airport (CTG), 10 min from the center. Direct flights from Bogotá, Medellín, Cali and international cities.
info.seguridad.title=Safety
info.seguridad.desc=The Historic Center, Bocagrande and Getsemaní are safe for tourists. Avoid displaying valuables and prefer trusted taxis or InDriver.
info.temporada.title=Best season
info.temporada.desc=December to April: dry weather, guaranteed sunshine, ideal for beaches. This period includes Hay Festival and Independence Day (November).

# ── Gastronomy ──
gastro.tag=Gastronomy
gastro.title=Flavors of the Colombian Caribbean
gastro.sub=Cartagena's cuisine is a blend of indigenous, African and Spanish traditions
gastro.g1.name=Arepa de Huevo
gastro.g1.desc=Cartagena's most iconic snack. Fried corn dough filled with egg. Found throughout the Historic Center.
gastro.g2.name=Arroz con Mariscos
gastro.g2.desc=Rice cooked in coconut milk with shrimp, chipi chipi and fresh Caribbean prawns.
gastro.g3.name=Tropical Juices
gastro.g3.desc=Passion fruit, tamarind, soursop and corozo. Corozo is the most Cartagena flavor there is.
gastro.g4.name=Carimañola de Yuca
gastro.g4.desc=Fried yuca dough filled with meat or cheese. An essential part of Caribbean food culture.
gastro.g5.name=Ceviche Cartagenero
gastro.g5.desc=Shrimp and chipi chipi marinated in lime with chili, red onion and tomato. Fresh and perfect for the heat.
gastro.g6.name=Ron & Chocolate
gastro.g6.desc=Colombian rum tasting with artisan chocolate. A unique sensory experience in El Arsenal de Getsemaní.

