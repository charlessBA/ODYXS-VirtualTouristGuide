# ── Info ──
info.tag=Información
info.title=Lo que debes saber antes de viajar
info.clima.title=Clima
info.clima.desc=Tropical con temperatura promedio de 27°C todo el año. Época seca: diciembre–abril (ideal para turismo). Época de lluvias: mayo–noviembre.
info.llegada.title=Cómo llegar
info.llegada.desc=Aeropuerto Internacional Rafael Núñez (CTG), a 10 min del centro. Vuelos directos desde Bogotá, Medellín, Cali y ciudades internacionales.
info.seguridad.title=Seguridad
info.seguridad.desc=El Centro Histórico, Bocagrande y Getsemaní son seguros para turistas. Evita mostrar objetos de valor y prefiere taxis de confianza o InDriver.
info.temporada.title=Mejor temporada
info.temporada.desc=Diciembre a abril: clima seco, sol garantizado, ideal para playas. En esta época se celebra el Hay Festival y Fiestas de Independencia (noviembre).

# ── Gastronomy ──
gastro.tag=Gastronomía
gastro.title=Sabores del Caribe Colombiano
gastro.sub=La cocina cartagenera es una fusión de tradiciones indígenas, africanas y españolas
gastro.g1.name=Arepa de Huevo
gastro.g1.desc=El snack más icónico de Cartagena. Masa de maíz frita rellena de huevo. Se encuentra en todo el Centro Histórico.
gastro.g2.name=Arroz con Mariscos
gastro.g2.desc=Arroz cocinado en leche de coco con camarones, chipi chipi y langostinos frescos del Caribe.
gastro.g3.name=Jugos Tropicales
gastro.g3.desc=Maracuyá, tamarindo, guanábana y corozo. El corozo es el sabor más cartagenero que existe.
gastro.g4.name=Carimañola de Yuca
gastro.g4.desc=Masa de yuca frita rellena de carne o queso. Parte esencial de la cultura gastronómica caribeña.
gastro.g5.name=Ceviche Cartagenero
gastro.g5.desc=Camarones y chipi chipi marinados en limón con ají, cebolla morada y tomate. Fresco y perfecto para el calor.
gastro.g6.name=Ron & Chocolate
gastro.g6.desc=Degustación de ron colombiano con chocolate artesanal. Una experiencia sensorial única en El Arsenal de Getsemaní.

# ── Climate ──
clima.tag=Clima
clima.title=¿Cuándo visitar Cartagena?
clima.sub=Clima tropical todo el año — siempre es una buena época para visitar La Heroica
clima.q1.title=Temporada Seca
clima.q1.desc=Época ideal. Sol garantizado, pocas lluvias, perfecta para playas e Islas del Rosario. Alta temporada turística.
clima.q2.title=Inicio de Lluvias
clima.q2.desc=Lluvia breve por las tardes. Ciudad menos congestionada, precios más bajos. Ideal para cultura e historia.
clima.q3.title=Temporada de Lluvias
clima.q3.desc=Aguaceros cortos pero intensos. Muy económico. El mar fosforescente de Isla Grande es espectacular en esta época.
clima.q4.title=Fiestas y Eventos
clima.q4.desc=Fiestas de Independencia (11 nov), inicio de temporada seca, Hay Festival. ¡La ciudad en su máxima expresión!

