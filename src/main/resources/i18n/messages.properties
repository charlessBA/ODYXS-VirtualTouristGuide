# ── Transporte (contenido estático i18n) ──────────────────────────────────────
transport.page.title=Transporte — ODYXS
transport.hero.title=Cómo moverse en Cartagena
transport.hero.subtitle=Guía completa de transporte para todos los viajeros

transport.card1.tipo=Transporte Público
transport.card1.nombre=Transcaribe
transport.card1.desc=Sistema de buses articulados de Cartagena. Conecta el aeropuerto, El Bosque, Ternera y el centro. La tarifa es plana y económica. Usa la tarjeta recargable en cualquier estación.
transport.card1.ruta=Aeropuerto → Centro: Línea T102
transport.card1.costo=💰 ~$3.900 COP por trayecto

transport.card2.tipo=Taxi Convencional
transport.card2.nombre=Taxi Cartagena
transport.card2.desc=Los taxis amarillos son abundantes. Siempre negocia el precio antes de subir o pide el taxímetro si lo tienen. Dentro del centro histórico el precio fijo suele ser $8.000–$12.000 COP. De noche puede subir un 20%.
transport.card2.costo=💰 $13.300–$30.000 COP

transport.card3.tipo=Aplicación Móvil
transport.card3.nombre=InDriver / Uber
transport.card3.desc=La app más popular en Cartagena. Propones el precio y el conductor acepta. Más económico y seguro que taxi de calle. También puedes usar Uber o Didi para mayor comodidad.
transport.card3.costo=💰 10–30% más barato que taxi

transport.card4.tipo=Transporte Marítimo
transport.card4.nombre=Lanchas a las Islas
transport.card4.desc=El transporte más emocionante. Desde el Muelle de la Bodeguita (Centro) y Muelle de Manga salen lanchas colectivas diarias a Islas del Rosario y Playa Blanca. Salen entre 8–9 AM.
transport.card4.costo=💰 $60.000–$120.000 COP ida/vuelta

transport.card5.tipo=A Pie
transport.card5.nombre=Centro Histórico a pie
transport.card5.desc=La mejor forma de conocer el Centro Histórico, Getsemaní y San Diego. Todo está a 10–20 minutos caminando. Lleva calzado cómodo: las calles adoquinadas son irregulares. Evita el sol de 12–3 PM.
transport.card5.costo=💰 Gratis

