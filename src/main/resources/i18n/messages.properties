# Historia
guia.historia.title=Historia &amp; Cultura
guia.historia.p1=Fundada en <strong>1533 por Pedro de Heredia</strong>, Cartagena fue el principal puerto colonial español en Sudamérica. Sus imponentes murallas y el Castillo de San Felipe la hicieron virtualmente inexpugnable durante siglos, resistiendo ataques de piratas como Francis Drake.
guia.historia.p2=El <strong>11 de noviembre de 1811</strong> declaró su independencia, siendo la primera ciudad en Colombia en hacerlo — de ahí el apodo "La Heroica". En <strong>1984</strong>, la UNESCO declaró su centro histórico y sus fortalezas Patrimonio de la Humanidad.
guia.historia.quote=Cartagena fue inspiración directa de Gabriel García Márquez, Premio Nobel de Literatura 1982. Sus calles adoquinadas y balcones coloridos aparecen en <em>El amor en los tiempos del cólera</em>.

guia.tl.y1533.title=Fundada por Pedro de Heredia
guia.tl.y1533.desc=Establecida como puerto colonial estratégico en el Caribe.
guia.tl.y1586.title=Ataque de Francis Drake
guia.tl.y1586.desc=El pirata inglés saqueó la ciudad, acelerando la construcción de sus defensas.
guia.tl.y17c.year=Siglo XVII
guia.tl.y17c.title=Las Murallas y el Castillo
guia.tl.y17c.desc=Se completan los 11 km de murallas y el Castillo San Felipe de Barajas.
guia.tl.y1811.title=Independencia — "La Heroica"
guia.tl.y1811.desc=Primera ciudad en Colombia en declarar su independencia de España.
guia.tl.y1984.title=Patrimonio UNESCO
guia.tl.y1984.desc=El centro histórico y las fortalezas son declarados Patrimonio de la Humanidad.
guia.tl.today=Hoy
guia.tl.today.title=Destino N.° 1 de Colombia
guia.tl.today.desc=Más de 1.5 millones de turistas visitan La Heroica cada año.

# Barrios
guia.barrios.title=Barrios para Explorar
guia.b1.name=Centro Histórico
guia.b1.desc=El corazón de la ciudad amurallada. Calles adoquinadas, plazas coloniales, Catedral de Santa Catalina y el Palacio de la Inquisición.
guia.b1.badge=Imperdible
guia.b2.name=Getsemaní
guia.b2.desc=El barrio bohemio y artístico. Murales callejeros vibrantes, champeta, bares auténticos y la mejor vida nocturna de la ciudad.
guia.b2.badge=Arte y Cultura
guia.b3.name=Bocagrande
guia.b3.desc=La zona moderna con hoteles de lujo, restaurantes y playa. La silueta de rascacielos contrasta hermosamente con el casco antiguo colonial visible al fondo.
guia.b3.badge=Playa y Hoteles
guia.b4.name=Manga
guia.b4.desc=Isla residencial tranquila con el Club de Pesca y muelle yatero. Vistas panorámicas a la bahía y ambiente local auténtico.
guia.b4.badge=Local y Relajado
guia.b5.name=Castillo Grande
guia.b5.desc=Península residencial de alto nivel al final de Bocagrande. Playas más tranquilas, condominios y el Club Náutico de Cartagena.
guia.b5.badge=Residencial
guia.b6.name=San Diego
guia.b6.desc=Barrio colonial dentro de las murallas. Conventos, iglesias barrocas y el mercado de Las Bóvedas — ideal para comprar artesanías.
guia.b6.badge=Compras y Arte

# Playas
guia.playas.title=Las Mejores Playas
guia.p1.name=Playa Blanca — Barú
guia.p1.badge=🥇 Top
guia.p1.desc=Arena blanca y aguas turquesa. La playa más famosa del Caribe colombiano.
guia.p1.costo=💰 ~$60.000 COP en lancha
guia.p2.name=Bocagrande
guia.p2.badge=Más accesible
guia.p2.desc=La más cercana al centro. Restaurantes frente al mar y ambiente caribeño.
guia.p2.costo=💰 Acceso gratuito
guia.p3.name=Islas del Rosario
guia.p3.badge=🤿 Buceo
guia.p3.desc=28 islas de coral. Agua cristalina ideal para snorkel y buceo. La Laguna Encantada brilla de noche.
guia.p3.costo=💰 Tour desde $80.000 COP
guia.playas.howto.title=Cómo llegar a las islas
guia.playas.howto.desc=Las lanchas salen desde el <strong>Muelle de la Bodeguita</strong> (frente al centro histórico) y el <strong>Muelle de Manga</strong>. Las lanchas colectivas salen entre las 8–9 AM. Para mayor privacidad puedes alquilar una lancha privada o unirte a un tour organizado con almuerzo incluido.

# Cuándo ir
guia.cuando.title=Cuándo Visitar Cartagena
guia.season1.title=Mejor Temporada
guia.season1.months=Diciembre — Abril
guia.season1.desc=Clima seco, sol garantizado. Perfecta para playas. Hay Festival (enero), temporada alta. Precios más altos pero la mejor experiencia.
guia.season2.title=Temporada Media
guia.season2.months=Mayo — Jul / Oct — Nov
guia.season2.desc=Lluvias cortas por las tardes. Ciudad menos congestionada, precios más bajos. Noviembre: Fiestas de Independencia (11 nov).
guia.season3.title=Temporada de Lluvias
guia.season3.months=Agosto — Septiembre
guia.season3.desc=Aguaceros frecuentes pero breves. Precios más económicos. Isla Grande de noche: plancton bioluminiscente espectacular. Lleva impermeable.

# Gastronomía
guia.gastro.title=Gastronomía Caribeña
guia.gastro.intro=La cocina cartagenera es una fusión de tres culturas: ingredientes indígenas (yuca, maíz), técnicas africanas (leche de coco, especias) y sazón española. El resultado es una gastronomía única en Latinoamérica.
guia.dish1.name=Ceviche de Camarón
guia.dish1.desc=El plato más icónico. Fresco y picante con ají.
guia.dish2.name=Arepa de Huevo
guia.dish2.desc=El snack más cartagenero. Masa de maíz frita con huevo.
guia.dish3.name=Cazuela de Mariscos
guia.dish3.desc=Guiso cremoso de leche de coco con almejas chipi chipi.
guia.dish4.name=Jugo de Corozo
guia.dish4.desc=La bebida más cartagenera. Frutal y refrescante.
guia.dish5.name=Arroz con Coco
guia.dish5.desc=El acompañamiento esencial de toda comida costeña.
guia.dish6.name=Carimañola de Yuca
guia.dish6.desc=Masa de yuca frita rellena de carne o queso.
guia.dish7.name=Ron + Chocolate
guia.dish7.desc=Degustación clásica en El Arsenal, Getsemaní.
guia.dish8.name=Langosta al Ajillo
guia.dish8.desc=Plato premium en restaurantes del Centro Histórico.
guia.gastro.rests.title=Restaurantes recomendados
guia.rest1.name=Jardín Santa Clara
guia.rest1.desc=Alta cocina en el Sofitel. Ambiente colonial exquisito.
guia.rest2.name=Alma
guia.rest2.desc=Restaurante 1621. Cocina de autor con ingredientes caribeños.
guia.rest3.name=La Cevichería
guia.rest3.desc=El mejor ceviche del centro histórico. Reserva anticipada recomendada.

# Consejos
guia.consejos.title=💡 Consejos de Viaje
guia.before.title=Antes de llegar
guia.c1.title=Descarga mapas offline
guia.c1.desc=Google Maps o Maps.me sin internet son esenciales. El WiFi callejero es intermitente.
guia.c2.title=Protector solar FPS 50+
guia.c2.desc=El sol caribeño es muy intenso. Aplica cada 2 horas, especialmente en las islas.
guia.c3.title=Reserva hoteles con anticipación
guia.c3.desc=En temporada alta (dic–abr) los hoteles del Centro Histórico se agotan semanas antes.
guia.c4.title=Camina el centro de noche
guia.c4.desc=El Centro Histórico es seguro y mágico de noche. Las murallas iluminadas son imperdibles.
guia.during.title=Durante tu visita
guia.c5.title=Negocia precios en la playa
guia.c5.desc=Los vendedores de playa esperan regateo. El primer precio suele ser el doble.
guia.c6.title=Usa InDriver o Uber
guia.c6.desc=Más económico y seguro que taxis de calle. Tráfico pesado en horas pico (7–9 AM, 5–7 PM).
guia.c7.title=Llega temprano a las islas
guia.c7.desc=Las lanchas salen a las 8–9 AM. Si llegas tarde, los mejores puestos en la playa ya están ocupados.
guia.c8.title=Mira el atardecer
guia.c8.desc=Siéntate en las murallas para la mejor vista del atardecer en toda Cartagena.

