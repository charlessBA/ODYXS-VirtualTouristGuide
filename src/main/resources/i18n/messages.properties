transport.tips.title=Consejos para moverte seguro
transport.tip1=En el Centro Histórico lo mejor es <strong>ir a pie</strong>: todo está a pocos minutos y así disfrutas mejor la arquitectura.
transport.tip2=Siempre negocia la tarifa del taxi <strong>antes de subir</strong> o pide que activen el taxímetro.
transport.tip3=Para las islas, sal desde el <strong>Muelle de la Bodeguita</strong> antes de las 9 AM para evitar filas.
transport.tip4=<strong>InDriver o Uber</strong> son más seguros para trayectos nocturnos. Tienen registro del viaje.
transport.tip5=<strong>Transcaribe</strong> conecta el aeropuerto con el centro por menos de $4.000. Requiere tarjeta recargable.
transport.tip6=Evita mostrarte con objetos de valor en calles poco transitadas. El Centro Histórico es muy seguro de día.

