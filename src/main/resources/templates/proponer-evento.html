<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Proponer Evento — ODYXS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/odyxs-travela.css}">
    <!-- Favicon ODYXS -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/apple-touch-icon.png}">
</head>
<body>
<div th:replace="fragments :: topbar"></div>
<div th:replace="fragments :: navbar-interno"></div>
<div class="page-breadcrumb-hero">
    <div style="position:relative;z-index:1;">
        <h1 style="font-style:italic;">➕ Proponer un Evento</h1>
        <div class="gold-line"></div>
        <p>Comparte un evento de Cartagena con la comunidad ODYXS</p>
    </div>
</div>
<div class="container py-5" style="max-width:680px;">
    <div class="bg-white rounded-3 shadow-sm p-4 p-lg-5">
        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
        <form action="/proponer-evento" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre del evento <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Festival de Música del Caribe" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" placeholder="Describe brevemente el evento..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Fecha <span class="text-danger">*</span></label>
                <input type="date" name="fecha" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Lugar / Sede</label>
                <input type="text" name="lugar" class="form-control" placeholder="Ej: Centro de Convenciones de Cartagena">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Imagen del evento (JPG, opcional)</label>
                <input type="file" name="imagen" class="form-control" accept="image/jpeg,image/jpg,image/png">
                <small class="text-muted">Se guardará como JPG automáticamente. Máx. 5 MB.</small>
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">
                <i class="fa fa-paper-plane me-2"></i>Enviar propuesta
            </button>
        </form>
        <p class="text-muted small mt-3 text-center">Tu propuesta será revisada por el equipo ODYXS antes de publicarse.</p>
        <div class="text-center mt-2">
            <a href="/eventos" class="text-muted small"><i class="fa fa-arrow-left me-1"></i>Volver a eventos</a>
        </div>
    </div>
</div>
<div th:replace="fragments :: footer-interno"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
