<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Iniciar Sesión — ODYXS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&family=Jost:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/odyxs-travela.css}">
    <!-- Favicon ODYXS -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/apple-touch-icon.png}">
</head>
<body style="background:var(--cream);">

<div class="auth-wrapper">
    <!-- Lado izquierdo: imagen Cartagena -->
    <div class="auth-left d-none d-lg-flex flex-column justify-content-end"
         style="background-image:url('/img/about-torre-reloj.jpg');">
        <div class="auth-left-content">
            <span class="badge rounded-pill px-3 py-2 mb-3" style="background:rgba(255,193,7,.9);color:var(--azul);font-weight:700;">🇨🇴 Patrimonio UNESCO</span>
            <h2 class="fw-bold">Cartagena de Indias</h2>
            <p class="mb-0" style="color:rgba(255,255,255,.8);">Torre del Reloj · Ciudad Amurallada · Mar Caribe</p>
        </div>
    </div>

    <!-- Lado derecho: formulario -->
    <div class="auth-right">
        <div class="auth-form-box">
            <a href="/" class="auth-brand d-block mb-4">
                <i class="fa fa-anchor me-2"></i>ODYXS
            </a>
            <h4 class="fw-bold mb-1">Bienvenido de vuelta</h4>
            <p class="text-muted mb-4">Inicia sesión para explorar Cartagena</p>

            <div class="alerta-error" th:if="${error}" th:text="${error}"></div>

            <form action="/login" method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa fa-envelope text-primary"></i></span>
                        <input type="email" name="correo" class="form-control border-start-0"
                               placeholder="tucorreo@email.com" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="fa fa-lock text-primary"></i></span>
                        <input type="password" name="contrasena" class="form-control border-start-0"
                               placeholder="Tu contraseña" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">
                    <i class="fa fa-sign-in-alt me-2"></i>Iniciar sesión
                </button>
            </form>

            <hr class="my-4">
            <p class="text-center text-muted mb-0">
                ¿No tienes cuenta?
                <a href="/registro" class="text-primary fw-semibold">Regístrate gratis</a>
            </p>
            <p class="text-center mt-2 mb-0">
                <a href="/" class="text-muted small"><i class="fa fa-arrow-left me-1"></i>Volver al inicio</a>
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
