<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Proponer Actividad — ODYXS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/odyxs-travela.css}">
    <!-- Favicon ODYXS -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/apple-touch-icon.png}">
</head>
<body>
<div th:replace="fragments :: topbar"></div>
<div th:replace="fragments :: navbar-interno"></div>

<div class="page-breadcrumb-hero">
    <div style="position:relative;z-index:1;">
        <nav aria-label="breadcrumb" class="mb-2">
            <ol class="breadcrumb justify-content-center mb-0" style="background:none;">
                <li class="breadcrumb-item"><a href="/" class="text-white-50 text-decoration-none">Inicio</a></li>
                <li class="breadcrumb-item"><a href="/actividades" class="text-white-50 text-decoration-none">Actividades</a></li>
                <li class="breadcrumb-item active text-white">Proponer actividad</li>
            </ol>
        </nav>
        <h1 style="font-style:italic;">➕ Proponer una Actividad</h1>
        <div class="gold-line"></div>
        <p>Comparte una actividad de Cartagena con la comunidad ODYXS</p>
    </div>
</div>

<div class="container py-5" style="max-width:700px;">
    <div class="bg-white rounded-3 shadow-sm p-4 p-lg-5">

        <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

        <form action="/proponer-actividad" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre de la actividad <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control"
                       placeholder="Ej: Tour en kayak por los manglares" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="4"
                          placeholder="Describe la actividad, qué incluye, puntos de interés..."></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Categoría <span class="text-danger">*</span></label>
                    <select name="categoria" class="form-select" required>
                        <option value="">-- Seleccionar --</option>
                        <option value="TOUR">🗺️ Tour</option>
                        <option value="DEPORTE">🏄 Deporte</option>
                        <option value="CULTURA">🏛️ Cultura</option>
                        <option value="GASTRONOMIA">🍽️ Gastronomía</option>
                        <option value="NATURALEZA">🌿 Naturaleza</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">Duración aproximada</label>
                    <input type="text" name="duracion" class="form-control"
                           placeholder="Ej: 3 horas, Medio día">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Precio aproximado</label>
                <input type="text" name="precioAprox" class="form-control"
                       placeholder="Ej: $80.000 COP por persona, Gratis">
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Imagen de la actividad (JPG/PNG, opcional)</label>
                <input type="file" name="imagen" class="form-control" accept="image/jpeg,image/jpg,image/png">
                <small class="text-muted">Máx. 2 MB.</small>
            </div>

            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">
                <i class="fa fa-paper-plane me-2"></i>Enviar propuesta
            </button>
        </form>

        <p class="text-muted small mt-3 text-center">
            Tu propuesta será revisada por el equipo ODYXS antes de publicarse.
        </p>
        <div class="text-center mt-2">
            <a href="/actividades" class="text-muted small">
                <i class="fa fa-arrow-left me-1"></i>Volver a actividades
            </a>
        </div>
    </div>
</div>

<div th:replace="fragments :: footer-interno"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
