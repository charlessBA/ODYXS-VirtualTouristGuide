<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Background circle -->
  <circle cx="60" cy="60" r="60" fill="#0f172a"/>
  <!-- Dashed compass ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#38bdf8" stroke-width="2" stroke-dasharray="6 4"/>
  <!-- Cardinal tick marks -->
  <line x1="60" y1="10" x2="60" y2="22" stroke="#38bdf8" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="60" y1="98" x2="60" y2="110" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="10" y1="60" x2="22" y2="60" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="98" y1="60" x2="110" y2="60" stroke="#64748b" stroke-width="1.5" stroke-linecap="round"/>
  <!-- North arrow (blue) -->
  <polygon points="60,18 67,44 60,39 53,44" fill="#38bdf8"/>
  <!-- South arrow (dark) -->
  <polygon points="60,102 67,76 60,81 53,76" fill="#334155"/>
  <!-- Inner circle background -->
  <circle cx="60" cy="60" r="30" fill="#1e293b"/>
  <!-- Letter O -->
  <text x="60" y="72" text-anchor="middle" dominant-baseline="auto"
        font-family="Arial, Helvetica, sans-serif"
        font-size="34" font-weight="700" fill="#f8fafc" letter-spacing="-1">O</text>
  <!-- Gold north dot accent -->
  <circle cx="60" cy="13" r="3.5" fill="#f59e0b"/>
</svg>
