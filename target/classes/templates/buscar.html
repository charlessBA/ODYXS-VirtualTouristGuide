<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Buscar — ODYXS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/odyxs-travela.css}">
    <!-- Favicon ODYXS -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/apple-touch-icon.png}">
</head>
<body>
<div th:replace="fragments :: topbar"></div>
<div th:replace="fragments :: navbar-interno"></div>
<div class="page-breadcrumb-hero">
    <div style="position:relative;z-index:1;">
        <h1 style="font-style:italic;">Buscar en Cartagena</h1>
        <div class="gold-line"></div>
        <p>Encuentra lugares, playas, hoteles y actividades</p>
    </div>
</div>
<div class="container py-5">
    <form action="/buscar" method="get" class="mb-5">
        <div class="d-flex gap-3 justify-content-center">
            <div class="input-group" style="max-width:600px;">
                <span class="input-group-text" style="background:var(--azul); border:none; color:var(--gold);"><i class="fa fa-search"></i></span>
                <input type="text" name="q" th:value="${query}" class="form-control" style="border-color:rgba(11,45,107,.2); font-size:1.05rem; padding:12px 16px;" placeholder="Buscar lugares en Cartagena...">
            </div>
            <button type="submit" class="btn btn-primary rounded-pill px-4">Buscar</button>
        </div>
    </form>

    <div th:if="${!#strings.isEmpty(query)}">
        <h5 class="fw-bold mb-1" style="color:var(--azul); font-family:'Cormorant Garamond',serif; font-size:1.4rem;" th:text="'Resultados para: &quot;' + ${query} + '&quot;'">Resultados</h5>
        <p class="text-muted mb-4" th:text="${#lists.size(lugares) + ' lugares encontrados'}">N resultados</p>
    </div>
    <div class="row g-4" th:if="${!#lists.isEmpty(lugares)}">
        <div class="col-md-6 col-lg-4" th:each="lugar : ${lugares}">
            <a th:href="@{/lugares/{id}(id=${lugar.id})}" class="lugar-card-travela">
                <div class="lct-img">
                    <img th:src="${lugar.imagenUrl != null ? lugar.imagenUrl : '/img/bocagrande.jpg'}"
                         th:alt="${lugar.nombre}" onerror="this.src='/img/bocagrande.jpg'">
                    <span class="lct-badge" th:text="${lugar.categoria.nombre}">Cat</span>
                </div>
                <div class="lct-body">
                    <h5 th:text="${lugar.nombre}">Nombre</h5>
                    <p><i class="fa fa-map-marker-alt me-1" style="color:var(--gold);"></i><span th:text="${lugar.ubicacion}">Ubicacion</span></p>
                    <span class="lct-ver-mas">Ver detalles <i class="fa fa-arrow-right ms-1"></i></span>
                </div>
            </a>
        </div>
    </div>
    <div class="text-center py-5" th:if="${#lists.isEmpty(lugares)}">
        <div style="font-size:3.5rem; margin-bottom:12px;">🔍</div>
        <h5 style="color:var(--azul); font-family:'Cormorant Garamond',serif;" th:text="'Sin resultados para: &quot;' + ${query} + '&quot;'">Sin resultados</h5>
        <p class="text-muted small mb-4">Intenta con términos más generales: playa, museo, restaurante, hotel...</p>
        <a href="/" class="btn btn-primary rounded-pill px-5">Volver al inicio</a>
    </div>
</div>
<div th:replace="fragments :: footer-interno"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
