<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Proponer Lugar — ODYXS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/odyxs-travela.css}">
    <!-- Favicon ODYXS -->
    <link rel="icon" type="image/svg+xml" th:href="@{/img/favicon.svg}">
    <link rel="icon" type="image/png" sizes="32x32" th:href="@{/img/favicon-32x32.png}">
    <link rel="icon" type="image/png" sizes="16x16" th:href="@{/img/favicon-16x16.png}">
    <link rel="apple-touch-icon" sizes="180x180" th:href="@{/img/apple-touch-icon.png}">
</head>
<body>
<div th:replace="fragments :: topbar"></div>
<div th:replace="fragments :: navbar-interno"></div>
<div class="page-breadcrumb-hero"><div><h1>➕ Proponer un Lugar</h1><p>Comparte un sitio turistico de Cartagena con la comunidad</p></div></div>
<div class="container py-5" style="max-width:680px;">
    <div class="bg-white rounded-3 shadow-sm p-4 p-lg-5">
        <div class="alerta-error" th:if="${error}" th:text="${error}"></div>
        <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>
        <!-- enctype multipart/form-data para soporte de imagen -->
        <form action="/proponer-lugar" method="post" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Nombre del lugar <span class="text-danger">*</span></label>
                <input type="text" name="nombre" class="form-control" placeholder="Ej: Playa La Bocana" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Descripcion</label>
                <textarea name="descripcion" class="form-control" rows="3" placeholder="Describe brevemente el lugar..."></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Ubicacion <span class="text-danger">*</span></label>
                <input type="text" name="ubicacion" class="form-control" placeholder="Ej: Barrio El Laguito, Cartagena" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Categoria</label>
                <select name="categoriaId" class="form-select">
                    <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nombre}">Cat</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">URL del mapa (opcional)</label>
                <input type="text" name="urlMapa" class="form-control" placeholder="https://maps.google.com/...">
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Imagen del lugar (opcional, max 2 MB)</label>
                <input type="file" name="imagen" class="form-control" accept="image/*">
            </div>
            <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-semibold">
                <i class="fa fa-paper-plane me-2"></i>Enviar propuesta
            </button>
        </form>
        <p class="text-muted small mt-3 text-center">Tu propuesta sera revisada por el equipo ODYXS antes de publicarse.</p>
    </div>
</div>
<div th:replace="fragments :: footer-interno"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
